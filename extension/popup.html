<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>지진 속보</title>
    <!-- 팝업용 스타일 시트 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 헤더 영역: 제목 및 새로 고침 버튼 -->
      <header class="header">
        <div class="title-block">
          <h1 class="title">지진 속보</h1>
          <p class="subtitle">최근 1시간 이내 전세계 지진 정보</p>
        </div>
        <button id="refreshButton" class="refresh-button">새로 고침</button>
      </header>

      <!-- 상태 표시 영역 (마지막 업데이트 시각, 오류 메시지 등) -->
      <section class="status-section">
        <span id="statusText" class="status-text">데이터 불러오는 중...</span>
      </section>

      <!-- 필터링 옵션 영역 -->
      <section class="filter-section">
        <div class="filter-controls">
          <label for="magnitudeFilter">최소 규모:</label>
          <select id="magnitudeFilter" class="magnitude-filter">
            <option value="0">모든 규모</option>
            <option value="2.0">M2.0 이상</option>
            <option value="3.0">M3.0 이상</option>
            <option value="4.0" selected>M4.0 이상</option>
            <option value="5.0">M5.0 이상</option>
            <option value="6.0">M6.0 이상</option>
          </select>
        </div>
      </section>

      <!-- 최근 지진 리스트 영역 -->
      <section class="list-section">
        <!-- 지진 항목이 동적으로 여기 들어간다 -->
        <ul id="earthquakeList" class="earthquake-list"></ul>
      </section>

      <!-- 복사 버튼 영역 -->
      <section class="copy-section">
        <button id="copyAllButton" class="copy-button">전체 복사하기</button>
      </section>

      <!-- 푸터: 간단한 안내 -->
      <footer class="footer">
        <span class="footer-text">
          데이터 출처: USGS<br />
          실시간으로 지진 정보를 제공합니다.<br />
          최신 정보는 20초마다 업데이트됩니다.
        </span>
      </footer>
    </div>

    <!-- 팝업 스크립트 -->
    <script src="earthquakeService.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
